<svg width="1400" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient - LIGHT MODE -->
  <defs>
    <linearGradient id="bgGradLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8D5F2;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#D4E5F7;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#C8F0FF;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#C8F5F0;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#D4F8F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8FFFE;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1400" height="900" fill="url(#bgGradLight)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1400" height="80" fill="rgba(255,255,255,0.5)" stroke="rgba(91,78,157,0.2)" stroke-width="1"/>
  
  <!-- Walrus Icon in Header -->
  <g transform="translate(30, 10) scale(0.35)">
    <ellipse cx="200" cy="240" rx="140" ry="120" fill="#7FDBDB" stroke="#000000" stroke-width="3"/>
    <ellipse cx="200" cy="140" rx="120" ry="110" fill="#7FDBDB" stroke="#000000" stroke-width="3"/>
    <path d="M 80 140 Q 80 80, 200 60 Q 320 80, 320 140" fill="#000000" stroke="#000000" stroke-width="2"/>
    <rect x="100" y="130" width="70" height="45" rx="5" fill="#000000" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="110" y1="135" x2="155" y2="165" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <rect x="230" y="130" width="70" height="45" rx="5" fill="#000000" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="240" y1="135" x2="285" y2="165" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <rect x="170" y="148" width="60" height="9" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <ellipse cx="200" cy="195" rx="8" ry="10" fill="#000000"/>
    <path d="M 170 210 Q 200 225, 230 210" stroke="#000000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 80 180 Q 40 175, 20 170" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 75 200 Q 30 200, 5 200" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 80 220 Q 40 225, 20 235" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 320 180 Q 360 175, 380 170" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 325 200 Q 370 200, 395 200" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 320 220 Q 360 225, 380 235" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 165 225 Q 160 280, 165 330 Q 168 345, 180 345 Q 185 340, 182 330 Q 178 280, 180 225 Z" fill="#FFFFFF" stroke="#000000" stroke-width="2.5"/>
    <path d="M 235 225 Q 240 280, 235 330 Q 232 345, 220 345 Q 215 340, 218 330 Q 222 280, 220 225 Z" fill="#FFFFFF" stroke="#000000" stroke-width="2.5"/>
  </g>
  
  <text x="120" y="50" font-family="Arial, sans-serif" font-size="28" fill="#1a1a1a" font-weight="bold">WalrusVault</text>
  <text x="1320" y="50" font-family="Arial, sans-serif" font-size="14" fill="#2C73D2" text-anchor="end">0x1234...abcd</text>
  
  <!-- Sidebar -->
  <rect x="0" y="80" width="200" height="820" fill="rgba(255,255,255,0.4)" stroke="rgba(91,78,157,0.15)" stroke-width="1"/>
  
  <!-- Tabs -->
  <g transform="translate(20, 120)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="rgba(91,78,157,0.1)"/>
    <text x="80" y="35" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">📤 Upload</text>
    
    <rect x="0" y="70" width="160" height="50" rx="8" fill="rgba(91,78,157,0.1)"/>
    <text x="80" y="105" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">📁 Files</text>
    
    <defs>
      <linearGradient id="tabGradLight" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#5B4E9D;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#3498D4;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#7EEBD8;stop-opacity:1" />
      </linearGradient>
    </defs>
    <rect x="0" y="140" width="160" height="50" rx="8" fill="url(#tabGradLight)"/>
    <text x="80" y="175" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">📥 Import</text>
  </g>
  
  <!-- Main Content - Import Tab -->
  <g transform="translate(250, 120)">
    <!-- Import Card -->
    <rect x="0" y="0" width="1100" height="700" rx="16" fill="rgba(255,255,255,0.6)" stroke="rgba(91,78,157,0.2)" stroke-width="2"/>
    
    <text x="550" y="40" font-family="Arial, sans-serif" font-size="24" fill="#1a1a1a" text-anchor="middle" font-weight="bold">📥 Import from Google Drive</text>
    <text x="550" y="70" font-family="Arial, sans-serif" font-size="14" fill="#555" text-anchor="middle">Bridge your Web2 files to Web3 storage</text>
    
    <!-- Connect Google Drive Button -->
    <defs>
      <linearGradient id="btnGradLight" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#5B4E9D;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#3498D4;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#7EEBD8;stop-opacity:1" />
      </linearGradient>
    </defs>
    <rect x="350" y="120" width="400" height="60" rx="12" fill="url(#btnGradLight)" stroke="none"/>
    <text x="550" y="160" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">🔗 Connect Google Drive</text>
    
    <!-- Info Box -->
    <rect x="100" y="220" width="900" height="120" rx="12" fill="rgba(52,152,212,0.1)" stroke="rgba(52,152,212,0.3)" stroke-width="2"/>
    <text x="550" y="260" font-family="Arial, sans-serif" font-size="16" fill="#2C73D2" text-anchor="middle" font-weight="bold">How it works:</text>
    <text x="550" y="290" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">1. Connect your Google Drive account</text>
    <text x="550" y="315" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">2. Select files to import</text>
    <text x="550" y="340" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">3. Files are encrypted with your wallet and stored on Walrus</text>
    
    <!-- File Selection Area (placeholder) -->
    <rect x="100" y="380" width="900" height="280" rx="12" fill="rgba(91,78,157,0.05)" stroke="rgba(91,78,157,0.15)" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="550" y="500" font-family="Arial, sans-serif" font-size="48" fill="rgba(91,78,157,0.2)" text-anchor="middle">📂</text>
    <text x="550" y="550" font-family="Arial, sans-serif" font-size="16" fill="#999" text-anchor="middle">Connect Google Drive to see your files</text>
  </g>
</svg>
