<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" width="1200" height="950">
  <defs>
    <linearGradient id="colorpegga" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B4E9D;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#4A7BC9;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#3498D4;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#3DBCC4;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7EEBD8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="950" fill="url(#colorpegga)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="90" fill="rgba(255,255,255,0.1)"/>
  <text x="40" y="55" font-size="32" font-weight="bold" fill="white" font-family="Arial, sans-serif">🐋 WalrusVault</text>
  <text x="1100" y="55" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="end" font-family="Arial, sans-serif">Wallet: 0x1234...5678 | Logout</text>

  <!-- Tabs -->
  <g id="tabs">
    <rect x="40" y="110" width="140" height="50" rx="8" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <text x="110" y="145" font-size="15" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">📁 My Files</text>
    
    <rect x="200" y="110" width="140" height="50" rx="8" fill="rgba(255,255,255,0.15)"/>
    <text x="270" y="145" font-size="15" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-family="Arial, sans-serif">⬆️ Upload</text>
    
    <rect x="360" y="110" width="140" height="50" rx="8" fill="rgba(255,255,255,0.15)"/>
    <text x="430" y="145" font-size="15" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-family="Arial, sans-serif">🔗 Import</text>
  </g>

  <!-- Search Bar Section -->
  <g id="search-section">
    <rect x="40" y="180" width="1120" height="70" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    
    <!-- Search Icon -->
    <text x="70" y="225" font-size="24" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif">🔍</text>
    
    <!-- Search Input -->
    <rect x="110" y="195" width="900" height="40" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <text x="130" y="225" font-size="14" fill="rgba(255,255,255,0.5)" font-family="Arial, sans-serif">Search files by name, type, or date...</text>
    
    <!-- Filter Button -->
    <rect x="1030" y="195" width="100" height="40" rx="8" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="1080" y="225" font-size="14" font-weight="600" fill="white" text-anchor="middle" font-family="Arial, sans-serif">⚙️ Filter</text>
  </g>

  <!-- File Cards Grid -->
  <g id="files">
    <!-- File Card 1 -->
    <rect x="40" y="280" width="270" height="280" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="175" y="340" font-size="48" text-anchor="middle" fill="white">📄</text>
    <text x="175" y="385" font-size="15" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">document.pdf</text>
    <text x="175" y="410" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-family="Arial, sans-serif">2.5 MB • May 28</text>
    <circle cx="115" cy="455" r="22" fill="rgba(255,255,255,0.2)"/>
    <text x="115" y="463" font-size="16" text-anchor="middle" fill="white">⬇️</text>
    <circle cx="235" cy="455" r="22" fill="rgba(255,255,255,0.2)"/>
    <text x="235" y="463" font-size="16" text-anchor="middle" fill="white">🗑️</text>

    <!-- File Card 2 -->
    <rect x="330" y="280" width="270" height="280" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="465" y="340" font-size="48" text-anchor="middle" fill="white">🖼️</text>
    <text x="465" y="385" font-size="15" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">photo.jpg</text>
    <text x="465" y="410" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-family="Arial, sans-serif">4.2 MB • May 27</text>
    <circle cx="405" cy="455" r="22" fill="rgba(255,255,255,0.2)"/>
    <text x="405" y="463" font-size="16" text-anchor="middle" fill="white">⬇️</text>
    <circle cx="525" cy="455" r="22" fill="rgba(255,255,255,0.2)"/>
    <text x="525" y="463" font-size="16" text-anchor="middle" fill="white">🗑️</text>

    <!-- File Card 3 -->
    <rect x="620" y="280" width="270" height="280" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="755" y="340" font-size="48" text-anchor="middle" fill="white">📊</text>
    <text x="755" y="385" font-size="15" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">data.xlsx</text>
    <text x="755" y="410" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-family="Arial, sans-serif">1.8 MB • May 26</text>
    <circle cx="695" cy="455" r="22" fill="rgba(255,255,255,0.2)"/>
    <text x="695" y="463" font-size="16" text-anchor="middle" fill="white">⬇️</text>
    <circle cx="815" cy="455" r="22" fill="rgba(255,255,255,0.2)"/>
    <text x="815" y="463" font-size="16" text-anchor="middle" fill="white">🗑️</text>

    <!-- File Card 4 -->
    <rect x="910" y="280" width="250" height="280" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="1035" y="340" font-size="48" text-anchor="middle" fill="white">🎵</text>
    <text x="1035" y="385" font-size="14" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">song.mp3</text>
    <text x="1035" y="410" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-family="Arial, sans-serif">5.1 MB</text>
    <circle cx="980" cy="455" r="22" fill="rgba(255,255,255,0.2)"/>
    <text x="980" y="463" font-size="16" text-anchor="middle" fill="white">⬇️</text>
    <circle cx="1090" cy="455" r="22" fill="rgba(255,255,255,0.2)"/>
    <text x="1090" y="463" font-size="16" text-anchor="middle" fill="white">🗑️</text>
  </g>

  <!-- Stats Section -->
  <g id="stats">
    <rect x="40" y="600" width="1120" height="110" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    
    <text x="100" y="635" font-size="13" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif">Total Files</text>
    <text x="100" y="665" font-size="32" font-weight="bold" fill="white" font-family="Arial, sans-serif">4</text>
    
    <text x="350" y="635" font-size="13" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif">Total Storage</text>
    <text x="350" y="665" font-size="32" font-weight="bold" fill="white" font-family="Arial, sans-serif">13.6 MB</text>
    
    <text x="600" y="635" font-size="13" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif">Encryption</text>
    <text x="600" y="665" font-size="32" font-weight="bold" fill="white" font-family="Arial, sans-serif">AES-256</text>
    
    <text x="900" y="635" font-size="13" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif">Status</text>
    <text x="900" y="665" font-size="32" font-weight="bold" fill="#7EEBD8" font-family="Arial, sans-serif">✓ Secure</text>
  </g>

  <!-- Footer -->
  <text x="600" y="920" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Arial, sans-serif">All files encrypted with wallet signature • Stored on Walrus Protocol • Search powered by local indexing</text>
</svg>
