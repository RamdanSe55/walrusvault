<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="colorpegga" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B4E9D;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#4A7BC9;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#3498D4;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#3DBCC4;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7EEBD8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#colorpegga)"/>

  <!-- Title -->
  <text x="600" y="60" font-size="40" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">🏗️ System Architecture</text>

  <!-- Frontend Layer -->
  <g id="frontend">
    <rect x="50" y="120" width="300" height="120" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="200" y="160" font-size="20" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Frontend</text>
    <text x="200" y="190" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-family="Arial, sans-serif">React + Vite</text>
    <text x="200" y="215" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Arial, sans-serif">Wallet Connect</text>
  </g>

  <!-- Backend Layer -->
  <g id="backend">
    <rect x="450" y="120" width="300" height="120" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="600" y="160" font-size="20" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Backend</text>
    <text x="600" y="190" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-family="Arial, sans-serif">Express.js</text>
    <text x="600" y="215" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Arial, sans-serif">File Management</text>
  </g>

  <!-- Storage Layer -->
  <g id="storage">
    <rect x="850" y="120" width="300" height="120" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="1000" y="160" font-size="20" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Storage</text>
    <text x="1000" y="190" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-family="Arial, sans-serif">Walrus Protocol</text>
    <text x="1000" y="215" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Arial, sans-serif">Decentralized</text>
  </g>

  <!-- Arrows -->
  <line x1="350" y1="180" x2="450" y2="180" stroke="rgba(255,255,255,0.4)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="750" y1="180" x2="850" y2="180" stroke="rgba(255,255,255,0.4)" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Blockchain Layer -->
  <g id="blockchain">
    <rect x="200" y="320" width="800" height="120" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="600" y="360" font-size="20" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">⛓️ SUI Blockchain</text>
    <text x="600" y="390" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-family="Arial, sans-serif">File Registry • Wallet Authentication • Metadata</text>
    <text x="600" y="415" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Arial, sans-serif">Tatum SDK Integration</text>
  </g>

  <!-- Arrows to Blockchain -->
  <line x1="200" y1="240" x2="400" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="600" y1="240" x2="600" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="1000" y1="240" x2="800" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Data Flow -->
  <g id="dataflow">
    <!-- Upload Flow -->
    <text x="100" y="520" font-size="18" font-weight="bold" fill="white" font-family="Arial, sans-serif">📤 Upload Flow</text>
    <text x="100" y="555" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">1. User selects file</text>
    <text x="100" y="580" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">2. Wallet signs transaction</text>
    <text x="100" y="605" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">3. File encrypted with signature</text>
    <text x="100" y="630" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">4. Stored on Walrus</text>
    <text x="100" y="655" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">5. Metadata on SUI</text>

    <!-- Download Flow -->
    <text x="550" y="520" font-size="18" font-weight="bold" fill="white" font-family="Arial, sans-serif">📥 Download Flow</text>
    <text x="550" y="555" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">1. User requests file</text>
    <text x="550" y="580" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">2. Verify ownership on SUI</text>
    <text x="550" y="605" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">3. Retrieve from Walrus</text>
    <text x="550" y="630" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">4. Decrypt with wallet</text>
    <text x="550" y="655" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">5. Download to device</text>

    <!-- Security -->
    <text x="1000" y="520" font-size="18" font-weight="bold" fill="white" font-family="Arial, sans-serif">🔐 Security</text>
    <text x="1000" y="555" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">• AES-256 Encryption</text>
    <text x="1000" y="580" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">• Wallet Signature Auth</text>
    <text x="1000" y="605" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">• No Passwords</text>
    <text x="1000" y="630" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">• Decentralized Storage</text>
    <text x="1000" y="655" font-size="13" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">• On-Chain Audit Trail</text>
  </g>

  <!-- Footer -->
  <text x="600" y="850" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Arial, sans-serif">Tatum x Walrus Hackathon • Decentralized File Storage with SUI Wallet</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="rgba(255,255,255,0.4)"/>
    </marker>
  </defs>
</svg>
