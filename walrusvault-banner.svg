<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="colorpegga" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B4E9D;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#4A7BC9;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#3498D4;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#3DBCC4;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7EEBD8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#colorpegga)"/>

  <!-- Walrus Icon (Large) -->
  <g id="walrus-large" transform="translate(200, 200)">
    <!-- Body -->
    <ellipse cx="0" cy="60" rx="90" ry="75" fill="#7FDBDB" stroke="#000" stroke-width="3"/>
    <!-- Head -->
    <circle cx="0" cy="-30" r="75" fill="#7FDBDB" stroke="#000" stroke-width="3"/>
    <!-- Cap -->
    <path d="M -60 -30 Q -60 -75, 0 -90 Q 60 -75, 60 -30" fill="#000"/>
    <!-- Sunglasses Left -->
    <rect x="-52" y="-45" width="45" height="30" rx="5" fill="#000" stroke="#FFF" stroke-width="3"/>
    <line x1="-45" y1="-40" x2="-15" y2="-20" stroke="#FFF" stroke-width="2" opacity="0.6"/>
    <!-- Sunglasses Right -->
    <rect x="7" y="-45" width="45" height="30" rx="5" fill="#000" stroke="#FFF" stroke-width="3"/>
    <line x1="15" y1="-40" x2="45" y2="-20" stroke="#FFF" stroke-width="2" opacity="0.6"/>
    <!-- Bridge -->
    <rect x="-7" y="-35" width="14" height="15" fill="#FFF"/>
    <!-- Nose -->
    <ellipse cx="0" cy="5" rx="10" ry="12" fill="#000"/>
    <!-- Smile -->
    <path d="M -25 25 Q 0 40, 25 25" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Whiskers Left -->
    <path d="M -60 0 Q -90 -5, -110 -10" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M -60 20 Q -95 20, -120 20" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M -60 40 Q -90 45, -110 55" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Whiskers Right -->
    <path d="M 60 0 Q 90 -5, 110 -10" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 60 20 Q 95 20, 120 20" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 60 40 Q 90 45, 110 55" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Tusks -->
    <path d="M -22 45 Q -27 90, -22 120 Q -19 135, -10 135 Q -5 130, -8 120 Q -12 90, -10 45 Z" fill="#FFF" stroke="#000" stroke-width="3"/>
    <path d="M 22 45 Q 27 90, 22 120 Q 19 135, 10 135 Q 5 130, 8 120 Q 12 90, 10 45 Z" fill="#FFF" stroke="#000" stroke-width="3"/>
  </g>

  <!-- Title -->
  <g id="title">
    <text x="600" y="140" font-size="72" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">WalrusVault</text>
    <text x="600" y="190" font-size="28" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-family="Arial, sans-serif">Decentralized File Storage</text>
    <text x="600" y="230" font-size="20" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-family="Arial, sans-serif">with SUI Wallet Authentication</text>
  </g>

  <!-- Features -->
  <g id="features">
    <text x="600" y="280" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-family="Arial, sans-serif">🔐 Wallet-Only Auth  •  🔒 End-to-End Encrypted  •  ⛓️ On-Chain Registry</text>
  </g>

  <!-- Footer -->
  <text x="600" y="350" font-size="18" font-weight="bold" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-family="Arial, sans-serif">🏆 Tatum x Walrus Hackathon 2026</text>
</svg>
