<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient - LIGHT MODE -->
  <defs>
    <linearGradient id="bgGradientLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8D5F2;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#D4E5F7;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#C8F0FF;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#C8F5F0;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#D4F8F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8FFFE;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradientLight)"/>
  
  <!-- Grid pattern -->
  <pattern id="gridLight" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(91,78,157,0.08)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#gridLight)"/>
  
  <!-- Walrus Icon -->
  <g transform="translate(80, 80) scale(0.8)">
    <ellipse cx="200" cy="240" rx="140" ry="120" fill="#7FDBDB" stroke="#000000" stroke-width="3"/>
    <ellipse cx="200" cy="140" rx="120" ry="110" fill="#7FDBDB" stroke="#000000" stroke-width="3"/>
    <path d="M 80 140 Q 80 80, 200 60 Q 320 80, 320 140" fill="#000000" stroke="#000000" stroke-width="2"/>
    <rect x="100" y="130" width="70" height="45" rx="5" fill="#000000" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="110" y1="135" x2="155" y2="165" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <rect x="230" y="130" width="70" height="45" rx="5" fill="#000000" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="240" y1="135" x2="285" y2="165" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <rect x="170" y="148" width="60" height="9" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <ellipse cx="200" cy="195" rx="8" ry="10" fill="#000000"/>
    <path d="M 170 210 Q 200 225, 230 210" stroke="#000000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 80 180 Q 40 175, 20 170" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 75 200 Q 30 200, 5 200" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 80 220 Q 40 225, 20 235" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 320 180 Q 360 175, 380 170" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 325 200 Q 370 200, 395 200" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 320 220 Q 360 225, 380 235" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 165 225 Q 160 280, 165 330 Q 168 345, 180 345 Q 185 340, 182 330 Q 178 280, 180 225 Z" fill="#FFFFFF" stroke="#000000" stroke-width="2.5"/>
    <path d="M 235 225 Q 240 280, 235 330 Q 232 345, 220 345 Q 215 340, 218 330 Q 222 280, 220 225 Z" fill="#FFFFFF" stroke="#000000" stroke-width="2.5"/>
  </g>
  
  <!-- Title -->
  <text x="350" y="140" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#1a1a1a">
    WalrusVault
  </text>
  
  <!-- Subtitle -->
  <text x="350" y="185" font-family="Arial, sans-serif" font-size="24" fill="#2C73D2">
    Decentralized File Storage with SUI Wallet Authentication
  </text>
  
  <!-- Divider -->
  <line x1="100" y1="230" x2="1100" y2="230" stroke="#3498D4" stroke-width="2" opacity="0.5"/>
  
  <!-- Features -->
  <g transform="translate(100, 280)">
    <!-- Feature 1 -->
    <circle cx="20" cy="20" r="12" fill="#5B4E9D"/>
    <text x="20" y="26" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">✓</text>
    <text x="50" y="28" font-family="Arial, sans-serif" font-size="20" fill="#1a1a1a" font-weight="600">Wallet-Only Authentication</text>
    <text x="50" y="52" font-family="Arial, sans-serif" font-size="16" fill="#555">No passwords needed - your wallet is your key</text>
    
    <!-- Feature 2 -->
    <circle cx="20" cy="100" r="12" fill="#5B4E9D"/>
    <text x="20" y="106" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">✓</text>
    <text x="50" y="108" font-family="Arial, sans-serif" font-size="20" fill="#1a1a1a" font-weight="600">End-to-End Encryption</text>
    <text x="50" y="132" font-family="Arial, sans-serif" font-size="16" fill="#555">Files encrypted with wallet signatures</text>
    
    <!-- Feature 3 -->
    <circle cx="20" cy="180" r="12" fill="#5B4E9D"/>
    <text x="20" y="186" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">✓</text>
    <text x="50" y="188" font-family="Arial, sans-serif" font-size="20" fill="#1a1a1a" font-weight="600">Walrus Decentralized Storage</text>
    <text x="50" y="212" font-family="Arial, sans-serif" font-size="16" fill="#555">Store files on decentralized blob storage</text>
  </g>
  
  <g transform="translate(650, 280)">
    <!-- Feature 4 -->
    <circle cx="20" cy="20" r="12" fill="#7EEBD8"/>
    <text x="20" y="26" font-family="Arial, sans-serif" font-size="16" fill="#000" text-anchor="middle" font-weight="bold">✓</text>
    <text x="50" y="28" font-family="Arial, sans-serif" font-size="20" fill="#1a1a1a" font-weight="600">SUI Blockchain Registry</text>
    <text x="50" y="52" font-family="Arial, sans-serif" font-size="16" fill="#555">File metadata on-chain for transparency</text>
    
    <!-- Feature 5 -->
    <circle cx="20" cy="100" r="12" fill="#7EEBD8"/>
    <text x="20" y="106" font-family="Arial, sans-serif" font-size="16" fill="#000" text-anchor="middle" font-weight="bold">✓</text>
    <text x="50" y="108" font-family="Arial, sans-serif" font-size="20" fill="#1a1a1a" font-weight="600">Google Drive Import</text>
    <text x="50" y="132" font-family="Arial, sans-serif" font-size="16" fill="#555">Bridge Web2 to Web3 seamlessly</text>
    
    <!-- Feature 6 -->
    <circle cx="20" cy="180" r="12" fill="#7EEBD8"/>
    <text x="20" y="186" font-family="Arial, sans-serif" font-size="16" fill="#000" text-anchor="middle" font-weight="bold">✓</text>
    <text x="50" y="188" font-family="Arial, sans-serif" font-size="20" fill="#1a1a1a" font-weight="600">Modern React UI</text>
    <text x="50" y="212" font-family="Arial, sans-serif" font-size="16" fill="#555">Smooth animations with Framer Motion</text>
  </g>
  
  <!-- Tech Stack -->
  <g transform="translate(100, 520)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#999" font-weight="600">POWERED BY:</text>
    
    <rect x="0" y="15" width="120" height="40" rx="8" fill="rgba(91,78,157,0.2)" stroke="#5B4E9D" stroke-width="2"/>
    <text x="60" y="42" font-family="Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Tatum</text>
    
    <rect x="140" y="15" width="120" height="40" rx="8" fill="rgba(126,235,216,0.3)" stroke="#7EEBD8" stroke-width="2"/>
    <text x="200" y="42" font-family="Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Walrus</text>
    
    <rect x="280" y="15" width="120" height="40" rx="8" fill="rgba(52,152,212,0.2)" stroke="#3498D4" stroke-width="2"/>
    <text x="340" y="42" font-family="Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle" font-weight="bold">SUI</text>
  </g>
  
  <!-- Hackathon Badge -->
  <g transform="translate(850, 520)">
    <rect x="0" y="0" width="280" height="80" rx="12" fill="rgba(255,255,255,0.6)" stroke="#3498D4" stroke-width="3"/>
    <text x="140" y="30" font-family="Arial, sans-serif" font-size="20" fill="#1a1a1a" text-anchor="middle" font-weight="bold">🏆 Tatum x Walrus Hackathon</text>
    <text x="140" y="55" font-family="Arial, sans-serif" font-size="16" fill="#2C73D2" text-anchor="middle">github.com/RamdanSe55/walrusvault</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="1050" cy="100" r="80" fill="#7EEBD8" opacity="0.12"/>
  <circle cx="1100" cy="500" r="60" fill="#5B4E9D" opacity="0.12"/>
</svg>
