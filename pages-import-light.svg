<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="pastel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5F2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C8F0FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8FFFE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#pastel)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="80" fill="rgba(255,255,255,0.7)"/>
  <text x="40" y="50" font-size="32" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">🐋 WalrusVault</text>

  <!-- Title -->
  <text x="600" y="140" font-size="36" font-weight="bold" fill="#1a1a1a" text-anchor="middle" font-family="Arial, sans-serif">Import from Google Drive</text>
  <text x="600" y="180" font-size="18" fill="#2a2a2a" text-anchor="middle" font-family="Arial, sans-serif">Bridge your Web2 files to Web3 storage</text>

  <!-- Import Box -->
  <g id="import-box">
    <rect x="150" y="220" width="500" height="480" rx="16" fill="rgba(255,255,255,0.8)" stroke="rgba(0,0,0,0.1)" stroke-width="2"/>
    
    <!-- Icon -->
    <text x="400" y="310" font-size="80" text-anchor="middle" fill="#1a1a1a">🔗</text>
    
    <!-- Connect Button -->
    <rect x="225" y="360" width="350" height="60" rx="10" fill="rgba(255,255,255,0.9)" stroke="rgba(0,0,0,0.2)" stroke-width="2"/>
    <text x="400" y="400" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle" font-family="Arial, sans-serif">📁 Connect Google Drive</text>
    
    <!-- Steps -->
    <g id="steps">
      <text x="250" y="470" font-size="14" fill="#2a2a2a" font-family="Arial, sans-serif">1. Authorize Google Drive access</text>
      <text x="250" y="500" font-size="14" fill="#2a2a2a" font-family="Arial, sans-serif">2. Browse and select files</text>
      <text x="250" y="530" font-size="14" fill="#2a2a2a" font-family="Arial, sans-serif">3. Files encrypted with wallet signature</text>
      <text x="250" y="560" font-size="14" fill="#2a2a2a" font-family="Arial, sans-serif">4. Stored on Walrus Protocol</text>
      <text x="250" y="590" font-size="14" fill="#2a2a2a" font-family="Arial, sans-serif">5. Original files remain in Drive</text>
    </g>
    
    <!-- Status -->
    <rect x="225" y="620" width="350" height="50" rx="8" fill="rgba(255,255,255,0.6)"/>
    <text x="400" y="652" font-size="14" fill="#3a3a3a" text-anchor="middle" font-family="Arial, sans-serif">Status: Not Connected</text>
  </g>

  <!-- Info Box -->
  <g id="info-box">
    <rect x="700" y="220" width="450" height="480" rx="16" fill="rgba(255,255,255,0.8)" stroke="rgba(0,0,0,0.1)" stroke-width="2"/>
    
    <text x="925" y="270" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle" font-family="Arial, sans-serif">🌉 Web2 to Web3 Bridge</text>
    
    <!-- Features -->
    <g id="features">
      <circle cx="750" cy="330" r="8" fill="#00AA88"/>
      <text x="780" y="337" font-size="14" fill="#2a2a2a" font-family="Arial, sans-serif">Browse your Google Drive files</text>
      
      <circle cx="750" cy="370" r="8" fill="#00AA88"/>
      <text x="780" y="377" font-size="14" fill="#2a2a2a" font-family="Arial, sans-serif">Select files to import</text>
      
      <circle cx="750" cy="410" r="8" fill="#00AA88"/>
      <text x="780" y="417" font-size="14" fill="#2a2a2a" font-family="Arial, sans-serif">Files encrypted with wallet signature</text>
      
      <circle cx="750" cy="450" r="8" fill="#00AA88"/>
      <text x="780" y="457" font-size="14" fill="#2a2a2a" font-family="Arial, sans-serif">Stored on decentralized Walrus</text>
      
      <circle cx="750" cy="490" r="8" fill="#00AA88"/>
      <text x="780" y="497" font-size="14" fill="#2a2a2a" font-family="Arial, sans-serif">Original files remain in Google Drive</text>
      
      <circle cx="750" cy="530" r="8" fill="#00AA88"/>
      <text x="780" y="537" font-size="14" fill="#2a2a2a" font-family="Arial, sans-serif">Access from anywhere with wallet</text>
    </g>
    
    <!-- Security Badge -->
    <rect x="750" y="570" width="350" height="100" rx="10" fill="rgba(255,255,255,0.6)"/>
    <text x="925" y="605" font-size="16" font-weight="bold" fill="#00AA88" text-anchor="middle" font-family="Arial, sans-serif">🔐 End-to-End Encrypted</text>
    <text x="925" y="635" font-size="12" fill="#3a3a3a" text-anchor="middle" font-family="Arial, sans-serif">Your files, your keys</text>
    <text x="925" y="655" font-size="12" fill="#3a3a3a" text-anchor="middle" font-family="Arial, sans-serif">No one else can decrypt</text>
  </g>

  <!-- Footer -->
  <text x="600" y="760" font-size="12" fill="#3a3a3a" text-anchor="middle" font-family="Arial, sans-serif">Seamlessly bridge Web2 and Web3 • Powered by Walrus Protocol</text>
</svg>
