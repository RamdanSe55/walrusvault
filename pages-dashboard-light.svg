<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="pastel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5F2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C8F0FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8FFFE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#pastel)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="80" fill="rgba(255,255,255,0.7)"/>
  <text x="40" y="50" font-size="32" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">🐋 WalrusVault</text>
  <text x="1100" y="50" font-size="14" fill="#3a3a3a" text-anchor="end" font-family="Arial, sans-serif">Wallet: 0x1234...5678</text>

  <!-- Tabs -->
  <g id="tabs">
    <rect x="40" y="100" width="150" height="50" rx="8" fill="rgba(255,255,255,0.8)" stroke="rgba(0,0,0,0.2)" stroke-width="2"/>
    <text x="115" y="135" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle" font-family="Arial, sans-serif">📁 My Files</text>
    
    <rect x="210" y="100" width="150" height="50" rx="8" fill="rgba(255,255,255,0.5)"/>
    <text x="285" y="135" font-size="16" fill="#3a3a3a" text-anchor="middle" font-family="Arial, sans-serif">⬆️ Upload</text>
    
    <rect x="380" y="100" width="150" height="50" rx="8" fill="rgba(255,255,255,0.5)"/>
    <text x="455" y="135" font-size="16" fill="#3a3a3a" text-anchor="middle" font-family="Arial, sans-serif">🔗 Import</text>
  </g>

  <!-- File Cards Grid -->
  <g id="files">
    <!-- File Card 1 -->
    <rect x="40" y="180" width="280" height="280" rx="12" fill="rgba(255,255,255,0.7)" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
    <text x="180" y="240" font-size="48" text-anchor="middle" fill="#1a1a1a">📄</text>
    <text x="180" y="290" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle" font-family="Arial, sans-serif">document.pdf</text>
    <text x="180" y="315" font-size="12" fill="#3a3a3a" text-anchor="middle" font-family="Arial, sans-serif">2.5 MB • May 28</text>
    <circle cx="120" cy="360" r="25" fill="rgba(255,255,255,0.8)"/>
    <text x="120" y="368" font-size="18" text-anchor="middle" fill="#1a1a1a">⬇️</text>
    <circle cx="240" cy="360" r="25" fill="rgba(255,255,255,0.8)"/>
    <text x="240" y="368" font-size="18" text-anchor="middle" fill="#1a1a1a">🗑️</text>

    <!-- File Card 2 -->
    <rect x="340" y="180" width="280" height="280" rx="12" fill="rgba(255,255,255,0.7)" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
    <text x="480" y="240" font-size="48" text-anchor="middle" fill="#1a1a1a">🖼️</text>
    <text x="480" y="290" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle" font-family="Arial, sans-serif">photo.jpg</text>
    <text x="480" y="315" font-size="12" fill="#3a3a3a" text-anchor="middle" font-family="Arial, sans-serif">4.2 MB • May 27</text>
    <circle cx="420" cy="360" r="25" fill="rgba(255,255,255,0.8)"/>
    <text x="420" y="368" font-size="18" text-anchor="middle" fill="#1a1a1a">⬇️</text>
    <circle cx="540" cy="360" r="25" fill="rgba(255,255,255,0.8)"/>
    <text x="540" y="368" font-size="18" text-anchor="middle" fill="#1a1a1a">🗑️</text>

    <!-- File Card 3 -->
    <rect x="640" y="180" width="280" height="280" rx="12" fill="rgba(255,255,255,0.7)" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
    <text x="780" y="240" font-size="48" text-anchor="middle" fill="#1a1a1a">📊</text>
    <text x="780" y="290" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle" font-family="Arial, sans-serif">data.xlsx</text>
    <text x="780" y="315" font-size="12" fill="#3a3a3a" text-anchor="middle" font-family="Arial, sans-serif">1.8 MB • May 26</text>
    <circle cx="720" cy="360" r="25" fill="rgba(255,255,255,0.8)"/>
    <text x="720" y="368" font-size="18" text-anchor="middle" fill="#1a1a1a">⬇️</text>
    <circle cx="840" cy="360" r="25" fill="rgba(255,255,255,0.8)"/>
    <text x="840" y="368" font-size="18" text-anchor="middle" fill="#1a1a1a">🗑️</text>

    <!-- File Card 4 -->
    <rect x="940" y="180" width="220" height="280" rx="12" fill="rgba(255,255,255,0.7)" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
    <text x="1050" y="240" font-size="48" text-anchor="middle" fill="#1a1a1a">🎵</text>
    <text x="1050" y="290" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle" font-family="Arial, sans-serif">song.mp3</text>
    <text x="1050" y="315" font-size="12" fill="#3a3a3a" text-anchor="middle" font-family="Arial, sans-serif">5.1 MB</text>
    <circle cx="1000" cy="360" r="25" fill="rgba(255,255,255,0.8)"/>
    <text x="1000" y="368" font-size="18" text-anchor="middle" fill="#1a1a1a">⬇️</text>
    <circle cx="1100" cy="360" r="25" fill="rgba(255,255,255,0.8)"/>
    <text x="1100" y="368" font-size="18" text-anchor="middle" fill="#1a1a1a">🗑️</text>
  </g>

  <!-- Stats -->
  <g id="stats">
    <rect x="40" y="500" width="1120" height="100" rx="12" fill="rgba(255,255,255,0.7)" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
    
    <text x="100" y="535" font-size="14" fill="#3a3a3a" font-family="Arial, sans-serif">Total Files</text>
    <text x="100" y="560" font-size="28" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">4</text>
    
    <text x="350" y="535" font-size="14" fill="#3a3a3a" font-family="Arial, sans-serif">Total Storage</text>
    <text x="350" y="560" font-size="28" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">13.6 MB</text>
    
    <text x="600" y="535" font-size="14" fill="#3a3a3a" font-family="Arial, sans-serif">Encryption</text>
    <text x="600" y="560" font-size="28" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">AES-256</text>
    
    <text x="900" y="535" font-size="14" fill="#3a3a3a" font-family="Arial, sans-serif">Status</text>
    <text x="900" y="560" font-size="28" font-weight="bold" fill="#00AA88" font-family="Arial, sans-serif">✓ Secure</text>
  </g>

  <!-- Footer -->
  <text x="600" y="850" font-size="12" fill="#3a3a3a" text-anchor="middle" font-family="Arial, sans-serif">All files encrypted with wallet signature • Stored on Walrus Protocol</text>
</svg>
