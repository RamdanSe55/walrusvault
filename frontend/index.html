<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalrusVault - Encrypted File Storage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="file"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 10px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .file-list {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .file-item {
            background: white;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .file-size {
            color: #666;
            font-size: 12px;
            margin-top: 4px;
        }

        .file-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-small:hover {
            background: #764ba2;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 WalrusVault</h1>
            <p>Encrypted File Storage on SUI Blockchain + Walrus</p>
        </div>

        <!-- Upload Section -->
        <div class="section">
            <h2>📤 Upload File</h2>
            <div class="form-group">
                <label for="walletAddress">Wallet Address</label>
                <input type="text" id="walletAddress" placeholder="0x..." required>
            </div>
            <div class="form-group">
                <label for="password">Encryption Password</label>
                <input type="password" id="password" placeholder="Enter strong password" required>
            </div>
            <div class="form-group">
                <label for="fileInput">Select File</label>
                <input type="file" id="fileInput" required>
            </div>
            <button onclick="uploadFile()">
                <span id="uploadBtnText">Upload & Encrypt</span>
            </button>
            <div id="uploadStatus" class="status hidden"></div>
        </div>

        <!-- Download Section -->
        <div class="section">
            <h2>📥 Download File</h2>
            <div class="form-group">
                <label for="downloadFileName">File Name</label>
                <input type="text" id="downloadFileName" placeholder="Enter file name" required>
            </div>
            <div class="form-group">
                <label for="downloadPassword">Decryption Password</label>
                <input type="password" id="downloadPassword" placeholder="Enter password" required>
            </div>
            <button onclick="downloadFile()">Download & Decrypt</button>
            <div id="downloadStatus" class="status hidden"></div>
        </div>

        <!-- Files List Section -->
        <div class="section">
            <h2>📁 Your Files</h2>
            <button onclick="listFiles()" style="margin-bottom: 15px;">Refresh List</button>
            <div id="filesList" class="file-list">
                <p style="color: #999; text-align: center;">No files yet</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';

        async function uploadFile() {
            const walletAddress = document.getElementById('walletAddress').value;
            const password = document.getElementById('password').value;
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const statusDiv = document.getElementById('uploadStatus');
            const btnText = document.getElementById('uploadBtnText');

            if (!walletAddress || !password || !file) {
                showStatus(statusDiv, 'Please fill all fields', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('password', password);
            formData.append('walletAddress', walletAddress);

            try {
                btnText.innerHTML = '<span class="loading"></span> Uploading...';
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(statusDiv, `✅ File encrypted! Hash: ${data.file.fileHash.substring(0, 16)}...`, 'success');
                    fileInput.value = '';
                    document.getElementById('password').value = '';
                    listFiles();
                } else {
                    showStatus(statusDiv, `❌ ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus(statusDiv, `❌ Upload failed: ${error.message}`, 'error');
            } finally {
                btnText.innerHTML = 'Upload & Encrypt';
            }
        }

        async function downloadFile() {
            const fileName = document.getElementById('downloadFileName').value;
            const password = document.getElementById('downloadPassword').value;
            const statusDiv = document.getElementById('downloadStatus');

            if (!fileName || !password) {
                showStatus(statusDiv, 'Please fill all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/files/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fileName, password })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    a.click();
                    showStatus(statusDiv, '✅ File downloaded successfully', 'success');
                } else {
                    const data = await response.json();
                    showStatus(statusDiv, `❌ ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus(statusDiv, `❌ Download failed: ${error.message}`, 'error');
            }
        }

        async function listFiles() {
            try {
                const response = await fetch(`${API_URL}/files/list`);
                const data = await response.json();
                const filesList = document.getElementById('filesList');

                if (data.files.length === 0) {
                    filesList.innerHTML = '<p style="color: #999; text-align: center;">No files yet</p>';
                    return;
                }

                filesList.innerHTML = data.files.map(file => `
                    <div class="file-item">
                        <div class="file-info">
                            <div class="file-name">${file.name}</div>
                            <div class="file-size">${(file.size / 1024).toFixed(2)} KB • ${new Date(file.uploadedAt).toLocaleDateString()}</div>
                        </div>
                        <div class="file-actions">
                            <button class="btn-small" onclick="deleteFile('${file.name}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error listing files:', error);
            }
        }

        async function deleteFile(fileName) {
            if (!confirm(`Delete ${fileName}?`)) return;

            try {
                const response = await fetch(`${API_URL}/files/${fileName}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    listFiles();
                }
            } catch (error) {
                console.error('Error deleting file:', error);
            }
        }

        function showStatus(element, message, type) {
            element.textContent = message;
            element.className = `status ${type}`;
            element.classList.remove('hidden');
        }

        // Load files on page load
        window.addEventListener('load', listFiles);
    </script>
</body>
</html>
