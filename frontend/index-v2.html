<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalrusVault - Decentralized File Storage</title>
    <script src="https://unpkg.com/@suiet/wallet-kit@0.2.17/dist/index.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .wallet-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .wallet-address {
            font-size: 12px;
            color: #666;
            background: #f3f4f6;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
        }

        .btn-wallet {
            background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-wallet:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }

        .btn-wallet:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 20px;
            color: #1e3a8a;
            margin-bottom: 20px;
            border-bottom: 2px solid #7c3aed;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }

        .file-list {
            display: grid;
            gap: 12px;
        }

        .file-item {
            background: #f9fafb;
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid #7c3aed;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #1e3a8a;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .file-meta {
            color: #6b7280;
            font-size: 12px;
            font-family: monospace;
        }

        .btn-download {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-download:hover {
            background: #6d28d9;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f4f6;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .contract-info {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
        }

        .contract-info p {
            font-size: 12px;
            color: #166534;
            margin: 4px 0;
            font-family: monospace;
        }

        .contract-info strong {
            color: #14532d;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header with Wallet Connection -->
        <div class="header">
            <div class="logo">
                <h1>🔐 WalrusVault</h1>
            </div>
            <div class="wallet-section">
                <div id="walletAddress" class="wallet-address" style="display: none;"></div>
                <button id="connectWallet" class="btn-wallet">Connect Wallet</button>
            </div>
        </div>

        <!-- Contract Info -->
        <div class="card">
            <div class="contract-info">
                <p><strong>Contract:</strong> 0x17e329f04c4ef0...</p>
                <p><strong>Network:</strong> SUI Testnet</p>
                <p><strong>Status:</strong> ✅ Deployed</p>
            </div>
        </div>

        <!-- Upload Section -->
        <div class="card">
            <h2>📤 Upload File</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label>Select File</label>
                    <input type="file" id="fileInput" required>
                </div>
                <div class="form-group">
                    <label>Encryption Password</label>
                    <input type="password" id="password" placeholder="Enter strong password" required>
                </div>
                <button type="submit" class="btn-primary" id="uploadBtn">
                    Upload to Walrus & SUI
                </button>
            </form>
            <div id="uploadStatus" class="status"></div>
        </div>

        <!-- Download Section -->
        <div class="card">
            <h2>📥 Download File</h2>
            <form id="downloadForm">
                <div class="form-group">
                    <label>Walrus Blob ID</label>
                    <input type="text" id="blobId" placeholder="blob_..." required>
                </div>
                <div class="form-group">
                    <label>Decryption Password</label>
                    <input type="password" id="downloadPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-primary" id="downloadBtn">
                    Download & Decrypt
                </button>
            </form>
            <div id="downloadStatus" class="status"></div>
        </div>

        <!-- My Files Section -->
        <div class="card">
            <h2>📁 My Files</h2>
            <div id="fileList" class="file-list">
                <p style="color: #6b7280; text-align: center;">Connect wallet to see your files</p>
            </div>
        </div>
    </div>

    <script>
        // SUI Wallet Connection
        const WalletKit = window.SuietWalletKit;
        let walletConnected = false;
        let currentWallet = null;

        // Initialize Wallet
        const connectWalletBtn = document.getElementById('connectWallet');
        const walletAddressDiv = document.getElementById('walletAddress');

        connectWalletBtn.addEventListener('click', async () => {
            try {
                if (walletConnected) {
                    // Disconnect
                    walletConnected = false;
                    currentWallet = null;
                    walletAddressDiv.style.display = 'none';
                    connectWalletBtn.textContent = 'Connect Wallet';
                    document.getElementById('fileList').innerHTML = '<p style="color: #6b7280; text-align: center;">Connect wallet to see your files</p>';
                    return;
                }

                // Connect wallet
                if (typeof window.suiWallet !== 'undefined') {
                    const accounts = await window.suiWallet.getAccounts();
                    if (accounts.length > 0) {
                        currentWallet = accounts[0];
                        walletConnected = true;
                        walletAddressDiv.textContent = `${currentWallet.address.substring(0, 10)}...${currentWallet.address.substring(-6)}`;
                        walletAddressDiv.style.display = 'block';
                        connectWalletBtn.textContent = 'Disconnect';
                        showStatus('Wallet connected successfully!', 'success', 'uploadStatus');
                        loadUserFiles();
                    }
                } else {
                    showStatus('Please install SUI Wallet extension', 'error', 'uploadStatus');
                }
            } catch (error) {
                showStatus('Wallet connection failed: ' + error.message, 'error', 'uploadStatus');
            }
        });

        // Upload File Handler
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!walletConnected) {
                showStatus('Please connect wallet first', 'error', 'uploadStatus');
                return;
            }

            const fileInput = document.getElementById('fileInput');
            const password = document.getElementById('password').value;
            const uploadBtn = document.getElementById('uploadBtn');

            if (!fileInput.files[0]) {
                showStatus('Please select a file', 'error', 'uploadStatus');
                return;
            }

            try {
                uploadBtn.disabled = true;
                uploadBtn.innerHTML = '<span class="loading"></span> Uploading...';

                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('password', password);
                formData.append('walletAddress', currentWallet.address);

                const response = await fetch('http://localhost:3001/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showStatus(`✅ File uploaded! Blob ID: ${result.file.walrusBlobId}`, 'success', 'uploadStatus');
                    document.getElementById('uploadForm').reset();
                    loadUserFiles();
                } else {
                    showStatus('Upload failed: ' + result.error, 'error', 'uploadStatus');
                }
            } catch (error) {
                showStatus('Upload error: ' + error.message, 'error', 'uploadStatus');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = 'Upload to Walrus & SUI';
            }
        });

        // Download File Handler
        document.getElementById('downloadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!walletConnected) {
                showStatus('Please connect wallet first', 'error', 'downloadStatus');
                return;
            }

            const blobId = document.getElementById('blobId').value;
            const password = document.getElementById('downloadPassword').value;
            const downloadBtn = document.getElementById('downloadBtn');

            try {
                downloadBtn.disabled = true;
                downloadBtn.innerHTML = '<span class="loading"></span> Downloading...';

                const response = await fetch(`http://localhost:3001/api/files/download/${blobId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, walletAddress: currentWallet.address })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `decrypted_${Date.now()}`;
                    a.click();
                    showStatus('✅ File downloaded and decrypted!', 'success', 'downloadStatus');
                } else {
                    showStatus('Download failed', 'error', 'downloadStatus');
                }
            } catch (error) {
                showStatus('Download error: ' + error.message, 'error', 'downloadStatus');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = 'Download & Decrypt';
            }
        });

        // Load User Files
        async function loadUserFiles() {
            if (!walletConnected) return;

            try {
                const response = await fetch(`http://localhost:3001/api/files?wallet=${currentWallet.address}`);
                const result = await response.json();

                if (result.files && result.files.length > 0) {
                    const fileList = document.getElementById('fileList');
                    fileList.innerHTML = result.files.map(file => `
                        <div class="file-item">
                            <div class="file-info">
                                <div class="file-name">${file.fileName}</div>
                                <div class="file-meta">Blob: ${file.blobId.substring(0, 20)}...</div>
                                <div class="file-meta">Size: ${(file.size / 1024).toFixed(2)} KB</div>
                            </div>
                            <button class="btn-download" onclick="copyToClipboard('${file.blobId}')">Copy ID</button>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading files:', error);
            }
        }

        // Utility Functions
        function showStatus(message, type, elementId) {
            const statusEl = document.getElementById(elementId);
            statusEl.textContent = message;
            statusEl.className = `status show ${type}`;
            setTimeout(() => statusEl.classList.remove('show'), 5000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('Blob ID copied to clipboard!');
        }

        // Load files on page load
        window.addEventListener('load', () => {
            console.log('WalrusVault Frontend loaded');
        });
    </script>
</body>
</html>
